<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
}

html,body{
    margin:0;
    padding:0;
    background:transparent;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

.event-card{
    width:100%;
    max-width:420px;
    background:rgba(7,7,7,.92);
    border:1px solid rgba(216,183,106,.75);
    box-shadow:0 18px 45px rgba(0,0,0,.35);
    display:flex;
    overflow:hidden;
}

.event-photo{
    width:112px;
    height:156px;
    object-fit:cover;
    object-position:center bottom;
    flex-shrink:0;
    margin-top:18px;
}

.content{
    flex:1;
    padding:16px;
    display:flex;
    flex-direction:column;
}

.kicker{
    color:#d8b76a;
    text-transform:uppercase;
    letter-spacing:.14em;
    font-size:11px;
    font-weight:bold;
    margin-bottom:5px;
}

.title{
    margin:0 0 10px;
    color:#ffffff;
    font-size:32px;
    line-height:.92;
    text-transform:uppercase;
    font-weight:800;
}

.details{
    color:#f7f2e8;
    text-transform:uppercase;
    letter-spacing:.08em;
    font-size:12px;
    line-height:1.45;
    font-weight:bold;
}

.bottom{
    margin-top:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding-top:16px;
}

.logo{
    width:68px;
    height:auto;
    background:#ffffff;
    padding:5px;
    margin-left:12px;
    margin-top:-8px;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
}

.agenda{
    color:#d8b76a;
    text-decoration:none;
    text-transform:uppercase;
    letter-spacing:.08em;
    font-size:11px;
    font-weight:bold;
    border-bottom:1px solid rgba(216,183,106,.7);
    transition:.25s;
}

.agenda:hover{
    color:#ffffff;
    border-color:#ffffff;
}

@media(max-width:420px){

.event-card{
    max-width:100%;
}

.event-photo{
    width:95px;
    height:150px;
}

.title{
    font-size:28px;
}

.details{
    font-size:11px;
}

.logo{
    width:58px;
    margin-left:8px;
}

}
</style>

</head>

<body>

<div class="event-card">

    <img src="board.jpg" class="event-photo" alt="IVCC Board Meeting">

    <div class="content">

        <div>

            <div class="kicker">
                Indian Valley Chamber
            </div>

            <div class="title">
                Meeting
            </div>

            <div class="details">
                Monday<br>
                July 13<br>
                6:00 PM<br>
                The Valley Grind
            </div>

        </div>

        <div class="bottom">

            <a
                class="agenda"
                href="https://indianvalleychamber.org/wp-content/uploads/2026/07/7.13.2026-IVCC-Agenda-1.pdf"
                target="_blank">
                View Agenda ↗
            </a>

        </div>

    </div>

</div>

</body>
</html>
