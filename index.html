<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap');

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: "Oswald", Arial, sans-serif;
  overflow: visible;
}

.ivcc-bar {
  width: 100%;
  max-width: 1100px;
  display: flex;
  background: #070707;
  border: 1px solid rgba(216,183,106,.8);
  box-shadow: 0 16px 38px rgba(0,0,0,.35);
}

.ivcc-link {
  color: #fff;
  text-decoration: none;
  text-transform: uppercase;
  min-height: 76px;
  display: flex;
  align-items: center;
  transition: .2s ease;
}

.ivcc-link:hover {
  background: #111;
  color: #d8b76a;
}

.meeting {
  width: 58%;
  padding: 12px 24px;
  gap: 16px;
  border-right: 1px solid rgba(216,183,106,.55);
  position: relative;
}

.gold {
  width: 42%;
  justify-content: center;
  text-align: center;
  padding: 12px 28px;
  font-size: 24px;
  line-height: 1;
  letter-spacing: .05em;
  font-weight: 700;
}

.logo {
  width: 34px;
  height: 34px;
  object-fit: contain;
  background: #fff;
  padding: 3px;
  flex-shrink: 0;
}

.meeting-copy {
  flex: 0 0 auto;
  min-width: 0;
}

.meeting-title {
  font-size: 23px;
  line-height: 1;
  letter-spacing: .045em;
  font-weight: 700;
  white-space: nowrap;
}

.meeting-sub {
  margin-top: 5px;
  color: #d8b76a;
  font-size: 12px;
  line-height: 1;
  letter-spacing: .16em;
  font-weight: 700;
}

.meeting-meta {
  margin-left: auto;
  color: #ffffff;
  font-size: 16px;
  line-height: 1;
  letter-spacing: .1em;
  white-space: nowrap;
  font-weight: 700;
  transition: color .2s ease;
}

.meeting-meta span {
  color: #d8b76a;
  transition: color .2s ease;
}

.meeting:hover .meeting-meta span {
  color: #ffffff;
  text-decoration: underline;
  text-underline-offset: 3px;
}

.tooltip {
  position: absolute;
  left: 22px;
  top: calc(100% + 8px);
  width: 260px;
  background: #070707;
  color: #fff;
  border: 1px solid rgba(216,183,106,.8);
  padding: 14px 16px;
  box-shadow: 0 14px 35px rgba(0,0,0,.38);
  opacity: 0;
  visibility: hidden;
  transform: translateY(-4px);
  transition: .2s ease;
  pointer-events: none;
  z-index: 20;
}

.meeting:hover .tooltip {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.tooltip-label {
  color: #d8b76a;
  font-size: 11px;
  letter-spacing: .14em;
  margin-bottom: 7px;
}

.tooltip-text {
  font-size: 18px;
  line-height: 1.2;
  letter-spacing: .05em;
}

@media (max-width: 980px) {
  .meeting {
    flex-wrap: wrap;
    align-items: center;
    row-gap: 6px;
  }

  .meeting-copy {
    flex: 1 1 calc(100% - 50px);
  }

  .meeting-meta {
    width: 100%;
    margin-left: 50px;
    font-size: 13px;
  }
}

@media (max-width: 780px) {
  .ivcc-bar {
    max-width: 440px;
    flex-direction: column;
  }

  .ivcc-link {
    width: 100%;
    min-height: 66px;
  }

  .meeting {
    border-right: none;
    border-bottom: 1px solid rgba(216,183,106,.55);
    padding: 12px 16px;
  }

  .gold {
    font-size: 25px;
    padding: 14px 18px;
  }

  .meeting-title {
    font-size: 23px;
  }

  .meeting-meta {
    margin-left: 46px;
    font-size: 13px;
  }

  .logo {
    width: 30px;
    height: 30px;
  }
}

@media (max-width: 420px) {
  .meeting {
    gap: 10px;
  }

  .meeting-title {
    font-size: 20px;
  }

  .meeting-sub {
    font-size: 10px;
  }

  .meeting-meta {
    margin-left: 40px;
    font-size: 11px;
  }

  .gold {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<div class="ivcc-bar">

  <a class="ivcc-link meeting"
     href="https://indianvalleychamber.org/wp-content/uploads/2026/07/7.13.2026-IVCC-Agenda-1.pdf"
     target="_blank">

    <img src="logo.jpg" class="logo" alt="The Valley Grind logo">

    <div class="meeting-copy">
      <div class="meeting-title">Meet the New Board</div>
      <div class="meeting-sub">Chamber Meeting</div>
    </div>

    <div class="meeting-meta">
      07 13 26 <span>| Agenda</span>
    </div>

    <div class="tooltip">
      <div class="tooltip-label">Meeting Details</div>
      <div class="tooltip-text">
        Monday, July 13<br>
        6:00 PM<br>
        The Valley Grind
      </div>
    </div>

  </a>

  <a class="ivcc-link gold"
     href="https://indianvalleychamber.org/gold-diggers-2026/"
     target="_blank">
    Gold Diggers 2026 Info
  </a>

</div>

</body>
</html>
